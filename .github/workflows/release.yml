name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build, Test, and Publish
        run: dotnet run --project build -- --target=Publish

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ github.ref_name }}"
          publish/win-x64/pondhawk-persistence-mcp.exe
          publish/osx-arm64/pondhawk-persistence-mcp
          publish/linux-x64/pondhawk-persistence-mcp
          publish/linux-arm64/pondhawk-persistence-mcp
          --title "${{ github.ref_name }}"
          --generate-notes
